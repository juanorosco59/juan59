<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f7f6;
        gap: 20px;
      }

      .sap-button {
        background-color: #0854a0;
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
      }

      .sap-section {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 2px dashed #ccc;
        width: 100%;
        text-align: center;
      }

      .sap-title {
        font-size: 16px;
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>

    <!-- BOTONES -->
    <button class="sap-button" onclick="launchNavigation()">
      Test 8.0 iOS
    </button>

    <button class="sap-button" onclick="openPdfMismaLogica()">
      Abrir PDF 8.1
    </button>

    <div class="sap-section">
      <div class="sap-title">Acción CXV2</div>
      <button class="sap-button" onclick="navigateToSapCustomer()">
        callNavigation
      </button>
    </div>

    <div class="sap-section">
      <div class="sap-title">Refresh</div>
      <button class="sap-button" onclick="callRefresh()">
        callRefresh
      </button>
    </div>

    <div class="sap-section">
      <div class="sap-title">callCreate</div>

      <button class="sap-button" onclick="openNewCnsCaseCreate()">
        callCreate
      </button>

      <button class="sap-button" onclick="crearTareaV3()">
        createTarea
      </button>
    </div>

    <div class="sap-section">
      <div class="sap-title">Parámetros URL</div>
      <p id="url-status"></p>
      <p id="url-pass"></p>
      <p id="url-subject"></p>
    </div>

    <script>
      /* =========================
         WEB NORMAL
      ========================= */

      function launchNavigation() {
        const params = new URLSearchParams(window.location.search);
        const idVisita = params.get("idVisita") || "Sin_IdVisita";

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const dispositivoTag = isMobile ? "Mobile" : "Desktop";

        const urlDestino =
          "https://www.google.com/search?q=" +
          encodeURIComponent(idVisita + " " + dispositivoTag);

        window.open(urlDestino, "_blank");
      }

      function openPdfMismaLogica() {
        window.open("VPN_Kaufmann.pdf", "_blank");
      }

      /* =========================
         SAP CX V2
      ========================= */

      function navigateToSapCustomer() {
        const sapEvent = {
          operation: "navigation",
          params: {
            objectKey: "11effdbc-ddd0-a24e-afdb-811bf0020a00",
            routingKey: "mdindividualcustomer",
            viewType: "quickview"
          }
        };

        window.parent.postMessage(sapEvent, "*");
      }

      function callRefresh() {
        window.parent.postMessage(
          {
            event: "refresh_mashup",
            operation: "triggerCustomAction"
          },
          "*"
        );
      }

      function openNewCnsCaseCreate() {
        const oCase = {
          operation: "navigation",
          params: {
            routingKey: "task",
            viewType: "quickcreate",
            initialValues: {
              field_description: "Nuevo caso desde script v2"
            }
          }
        };

        window.parent.postMessage(oCase, "*");
      }

      /* =========================
         ✅ FUNCIÓN CORRECTA GLOBAL
      ========================= */

function crearTareaV2() {
  if (typeof NavManagerUtil !== "undefined" && NavManagerUtil.quickCreate) {
    NavManagerUtil.quickCreate("crm-task-create-qv", [
      {
        name: "task",
        value: {
          startDateTime: "2026-04-28T09:00:00Z",
          dueDateTime: "2026-04-28T09:30:00Z"
        }
      }
    ]);
  } else {
    window.parent.postMessage(
      {
        operation: "navigation",
        params: {
          routingKey: "task",
          viewType: "quickcreate",
          initialValues: {
            startDateTime: "2026-04-28T09:00:00Z",
            dueDateTime: "2026-04-28T09:30:00Z"
          }
        }
      },
      "*"
    );
  }
}


      function crearTareaV3() {
  window.parent.postMessage(
    {
      operation: "navigation",
      params: {
        routingKey: "task",
        viewType: "quickcreate",
        initialValues: {
          startDateTime: "2026-04-28T09:00:00Z",
          dueDateTime: "2026-04-28T09:30:00Z"
        }
      }
    },
    "*"
  );
}

      function crearTareaV4() {
  window.parent.postMessage({
    event: "navigation",
    operation: "triggerNavigation",
    params: {
      routingKey: "task",
      viewType: "quickcreate",
      initialValues: {
        startDateTime: "2026-04-28T09:00:00Z",
        dueDateTime: "2026-04-28T09:30:00Z"
      }
    }
  }, "*");
}
      /* =========================
         URL PARAMS
      ========================= */

      function mostrarParametrosURL() {
        const params = new URLSearchParams(window.location.search);

        document.getElementById("url-status").innerText =
          "Status: " + (params.get("status") || "N/A");
        document.getElementById("url-pass").innerText =
          "Pass: " + (params.get("pass") || "N/A");
        document.getElementById("url-subject").innerText =
          "Subject: " + (params.get("subject") || "N/A");
      }

      

      window.onload = mostrarParametrosURL;
    </script>

  </body>
</html>
